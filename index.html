<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lady K II - Add Inventory Item</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: Arial, Helvetica, sans-serif; background: #0f1f3d; color: #1a1a1a; margin: 0; padding: 0; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 60px; }
  h1 { font-size: 18px; color: #fff; text-align: center; margin: 16px 0 4px; }
  .progress { height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
  .progress-bar { height: 100%; background: #4f9cf9; width: 0%; transition: width .25s ease; }
  .card { background: #fff; border-radius: 12px; padding: 22px 18px; box-shadow: 0 4px 18px rgba(0,0,0,0.25); min-height: 220px; display: flex; flex-direction: column; justify-content: space-between; }
  .step { display: none; }
  .step.active { display: block; }
  label.q { display: block; font-size: 15px; font-weight: bold; color: #1F3864; margin-bottom: 10px; }
  .field-row { display: flex; gap: 8px; align-items: stretch; }
  input[type=text], input[type=number], input[type=date], select, textarea { flex: 1; font-family: Arial, sans-serif; font-size: 15px; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%; }
  textarea { resize: vertical; min-height: 60px; }
  .mic-btn { flex: 0 0 44px; border: none; border-radius: 8px; background: #1F3864; color: #fff; font-size: 13px; font-weight: bold; cursor: pointer; }
  .mic-btn.listening { background: #d1483d; }
  .hint { font-size: 12px; color: #757575; margin-top: 6px; }
  .nav { display: flex; justify-content: space-between; margin-top: 22px; }
  button.nav-btn { font-family: Arial, sans-serif; font-size: 15px; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
  .btn-back { background: #e5e5e5; color: #333; }
  .btn-next { background: #1F3864; color: #fff; }
  .btn-submit { background: #2e7d32; color: #fff; }
  .photo-btns { display: flex; flex-direction: column; gap: 10px; }
  .photo-preview { width: 100%; max-height: 220px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none; }
  .review-line { font-size: 13px; padding: 6px 0; border-bottom: 1px solid #eee; }
  .review-line b { color: #1F3864; }
  .status { text-align: center; color: #fff; margin-top: 14px; font-size: 13px; }
  .add-new-row { margin-top: 8px; display: none; }
  .voice-legend { text-align: center; font-size: 14px; line-height: 1.6; color: #d7deed; margin-top: 16px; }
  .voice-legend b { color: #fff; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Lady K II - Add Inventory Item</h1>
  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  <div class="card">

    <div class="step active" data-step="0">
      <label class="q">Photo</label>
      <div class="photo-btns">
        <button type="button" class="nav-btn btn-next" onclick="document.getElementById('photoCameraInput').click()">Take Photo</button>
        <button type="button" class="nav-btn btn-next" onclick="document.getElementById('photoFileInput').click()">Choose from Library</button>
        <button type="button" class="nav-btn btn-back" onclick="go(1)">Skip</button>
      </div>
      <input type="file" id="photoCameraInput" accept="image/*" capture="environment" style="display:none">
      <input type="file" id="photoFileInput" accept="image/*" style="display:none">
      <img id="photoPreview" class="photo-preview">
      <div class="hint">Take a new photo, choose an existing one, or skip.</div>
    </div>

    <div class="step" data-step="1">
      <label class="q">System / Machinery?</label>
      <div class="field-row">
        <select id="systemSelect"></select>
        <button type="button" class="mic-btn" data-target="systemNew" data-select="systemSelect">MIC</button>
      </div>
      <div class="add-new-row" id="systemNewRow">
        <input type="text" id="systemNew" placeholder="Type new system">
      </div>
    </div>

    <div class="step" data-step="2">
      <label class="q">Part name?</label>
      <div class="field-row">
        <input type="text" id="partName" placeholder="e.g. Oil filter">
        <button type="button" class="mic-btn" data-target="partName">MIC</button>
      </div>
    </div>

    <div class="step" data-step="3">
      <label class="q">Category?</label>
      <select id="categorySelect"></select>
    </div>

    <div class="step" data-step="4">
      <label class="q">Description?</label>
      <div class="field-row">
        <textarea id="description" placeholder="Brief description, spec, model number"></textarea>
        <button type="button" class="mic-btn" data-target="description">MIC</button>
      </div>
    </div>

    <div class="step" data-step="5">
      <label class="q">Location onboard?</label>
      <div class="field-row">
        <select id="locationSelect"></select>
        <button type="button" class="mic-btn" data-target="locationNew" data-select="locationSelect">MIC</button>
      </div>
      <div class="add-new-row" id="locationNewRow">
        <input type="text" id="locationNew" placeholder="Type new location">
      </div>
    </div>

    <div class="step" data-step="6">
      <label class="q">Manufacturer / part number?</label>
      <div class="field-row">
        <input type="text" id="manufacturer">
        <button type="button" class="mic-btn" data-target="manufacturer">MIC</button>
      </div>
    </div>

    <div class="step" data-step="7">
      <label class="q">Quantity on hand?</label>
      <div class="field-row">
        <input type="number" id="qty" placeholder="Qty on hand" min="0">
      </div>
    </div>

    <div class="step" data-step="8">
      <label class="q">Minimum stock required?</label>
      <div class="field-row">
        <input type="number" id="minStock" placeholder="Min required" min="0">
      </div>
    </div>

    <div class="step" data-step="9">
      <label class="q">Unit cost?</label>
      <div class="field-row">
        <input type="number" id="unitCost" placeholder="Unit cost (EUR)" step="0.01" min="0">
      </div>
    </div>

    <div class="step" data-step="10">
      <label class="q">Supplier?</label>
      <div class="field-row">
        <input type="text" id="supplier" placeholder="Supplier / source">
        <button type="button" class="mic-btn" data-target="supplier">MIC</button>
      </div>
    </div>

    <div class="step" data-step="11">
      <label class="q">Purchase date?</label>
      <div class="field-row">
        <input type="date" id="purchaseDate">
      </div>
    </div>

    <div class="step" data-step="12">
      <label class="q">Expiration date?</label>
      <div class="field-row">
        <input type="date" id="expirationDate">
      </div>
      <div class="hint">Leave blank for parts with no shelf life.</div>
    </div>

    <div class="step" data-step="13">
      <label class="q">Critical spare?</label>
      <select id="criticalSelect">
        <option value="N" selected>No</option>
        <option value="Y">Yes</option>
      </select>
    </div>

    <div class="step" data-step="14">
      <label class="q">Any notes?</label>
      <div class="field-row">
        <textarea id="notes" placeholder="Lead time, order status, anything else"></textarea>
        <button type="button" class="mic-btn" data-target="notes">MIC</button>
      </div>
    </div>

    <div class="step" data-step="15">
      <label class="q">Review</label>
      <div id="reviewBox"></div>
    </div>

    <div class="step" data-step="16" id="successStep">
      <div style="text-align:center; padding: 20px 0;">
        <div style="font-size:48px;">&#9989;</div>
        <div style="font-size:18px; font-weight:bold; color:#1F3864; margin-top:10px;">Saved to Inventory</div>
        <div style="font-size:13px; color:#757575; margin-top:6px;" id="successDetail"></div>
        <div style="font-size:13px; color:#1F3864; margin-top:14px; font-weight:bold;">Say "Next" to add another item</div>
      </div>
    </div>

    <div class="nav" id="navBar">
      <button type="button" class="nav-btn btn-back" id="backBtn" onclick="go(-1)">Back</button>
      <button type="button" class="nav-btn btn-next" id="nextBtn" onclick="go(1)">Next</button>
      <button type="button" class="nav-btn btn-submit" id="submitBtn" onclick="submitForm()" style="display:none">Save to Inventory</button>
      <button type="button" class="nav-btn btn-next" id="addAnotherBtn" onclick="resetForm()" style="display:none">Add Another Item</button>
    </div>
    <div class="voice-legend"><b>Next</b> &middot; <b>Back</b> &middot; <b>Skip</b> &middot; <b>Repeat</b> &middot; <b>Delete</b> &middot; <b>Spell</b> &middot; <b>List</b> &middot; <b>Review</b> &middot; <b>Save</b></div>
  </div>
  <div class="status" id="statusMsg"></div>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxb1kqqkqcgeFFJXs8mXntI_uU9G3g-U-pYxH4KMOPeBc_uBOq1_mU17aDRb_VCJfbiNg/exec';

var REVIEW_STEP = 15;
var SUCCESS_STEP = 16;
var TOTAL_STEPS = 16;
var current = 0;
var photoBase64 = null, photoMime = null, photoFilename = null;

function updateProgress() {
  var pct = current >= SUCCESS_STEP ? 100 : Math.round((current / (TOTAL_STEPS - 1)) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
}

function showStep(i) {
  document.querySelectorAll('.step').forEach(function (el) {
    el.classList.toggle('active', Number(el.dataset.step) === i);
  });
  var isReview = i === REVIEW_STEP;
  var isSuccess = i === SUCCESS_STEP;
  document.getElementById('backBtn').style.visibility = (i === 0 || isSuccess) ? 'hidden' : 'visible';
  document.getElementById('nextBtn').style.display = (isReview || isSuccess) ? 'none' : 'inline-block';
  document.getElementById('submitBtn').style.display = isReview ? 'inline-block' : 'none';
  document.getElementById('addAnotherBtn').style.display = isSuccess ? 'inline-block' : 'none';
  if (isReview) buildReview();
  updateProgress();
  document.getElementById('statusMsg').textContent = '';
  triggerAutoListenForStep(i);
}

var lastGoDelta = 1;
function go(delta) {
  var next = current + delta;
  if (next < 0 || next > TOTAL_STEPS - 1) return;

  if (current === 0 && delta > 0 && photoBase64 && photoAnalysisPromise) {
    document.getElementById('statusMsg').textContent = 'Analyzing photo, one moment...';
    var timeout = new Promise(function (resolve) { setTimeout(resolve, 15000); });
    Promise.race([photoAnalysisPromise, timeout]).then(function () {
      document.getElementById('statusMsg').textContent = '';
      stopActiveRecognition();
      lastGoDelta = delta;
      current = next;
      showStep(current);
    });
    return;
  }

  stopActiveRecognition();
  lastGoDelta = delta;
  current = next;
  showStep(current);
}

document.addEventListener('keydown', function (e) {
  if (e.key !== 'Enter') return;
  var t = e.target;
  if (t.tagName === 'TEXTAREA') return;
  if (t.tagName === 'INPUT' && t.type === 'file') return;
  if (current === REVIEW_STEP || current === SUCCESS_STEP) return;
  e.preventDefault();
  go(1);
});

fetch(SCRIPT_URL + '?action=getFormData')
  .then(function (r) { return r.json(); })
  .then(function (data) {
    if (data.error) { console.error(data.error); return; }
    fillSelect('systemSelect', data.systems, 'System');
    fillSelect('locationSelect', data.locations, 'Location');
    fillSelect('categorySelect', data.categories, 'Category');
  })
  .catch(function (err) {
    document.getElementById('statusMsg').textContent = 'Could not load dropdown data: ' + err.message;
  });

function fillSelect(id, values, label) {
  var sel = document.getElementById(id);
  sel.innerHTML = '';
  var placeholder = document.createElement('option');
  placeholder.value = ''; placeholder.textContent = 'Select ' + label;
  sel.appendChild(placeholder);
  values.forEach(function (v) {
    var opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    sel.appendChild(opt);
  });
  var addNew = document.createElement('option');
  addNew.value = '__new__'; addNew.textContent = '+ Add new';
  sel.appendChild(addNew);
}

['systemSelect', 'locationSelect'].forEach(function (id) {
  document.getElementById(id).addEventListener('change', function () {
    var rowId = id === 'systemSelect' ? 'systemNewRow' : 'locationNewRow';
    document.getElementById(rowId).style.display = this.value === '__new__' ? 'block' : 'none';
  });
});

var photoAnalysis = null;
var photoAnalysisPromise = null;

function handlePhotoFile(file) {
  if (!file) return;
  photoMime = file.type;
  photoFilename = file.name;
  photoAnalysis = null;
  var reader = new FileReader();
  reader.onload = function () {
    photoBase64 = reader.result.split(',')[1];
    var img = document.getElementById('photoPreview');
    img.src = reader.result;
    img.style.display = 'block';
    photoAnalysisPromise = postToScript({ action: 'analyzePhoto', base64Data: photoBase64, mimeType: photoMime })
      .then(function (res) {
        if (!res.error) photoAnalysis = res;
      })
      .catch(function () { });
  };
  reader.readAsDataURL(file);
}
document.getElementById('photoCameraInput').addEventListener('change', function (e) {
  handlePhotoFile(e.target.files[0]);
});
document.getElementById('photoFileInput').addEventListener('change', function (e) {
  handlePhotoFile(e.target.files[0]);
});

var Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
var autoListenTimer = null;

var CATEGORY_OPTIONS = ['Engine', 'Generator', 'Electrical', 'HVAC', 'Watermaker', 'Plumbing',
  'Deck/Crane', 'Safety Equipment', 'Tender/Outboard', 'Galley',
  'Navigation/Electronics', 'Consumables', 'Other'];

var recognitionBusy = false;
var activeRecognition = null;

function stopActiveRecognition() {
  if (activeRecognition) {
    try { activeRecognition.abort(); } catch (e) { }
    activeRecognition = null;
  }
  recognitionBusy = false;
}

function startRecognition(onResult, onFail) {
  if (!Recognition) { onFail('unsupported'); return; }
  if (recognitionBusy) { onFail('busy'); return; }
  recognitionBusy = true;
  var recog = new Recognition();
  activeRecognition = recog;
  recog.lang = 'en-US';
  recog.interimResults = false;
  recog.maxAlternatives = 1;
  document.querySelectorAll('.mic-btn').forEach(function (b) { b.classList.add('listening'); });
  try {
    recog.start();
  } catch (e) {
    recognitionBusy = false;
    activeRecognition = null;
    document.querySelectorAll('.mic-btn').forEach(function (b) { b.classList.remove('listening'); });
    onFail(e.message);
    return;
  }
  recog.onresult = function (event) {
    var text = event.results[0][0].transcript;
    var handled = tryGlobalCommand(text);
    if (!handled) onResult(text);
  };
  recog.onend = function () {
    recognitionBusy = false;
    activeRecognition = null;
    document.querySelectorAll('.mic-btn').forEach(function (b) { b.classList.remove('listening'); });
  };
  recog.onerror = function (event) {
    recognitionBusy = false;
    activeRecognition = null;
    onFail(event.error);
  };
}

var STEP_SELECTS = {
  1: { sel: 'systemSelect', label: 'System' },
  3: { sel: 'categorySelect', label: 'Category' },
  5: { sel: 'locationSelect', label: 'Location' },
  13: { sel: 'criticalSelect', label: 'Critical spare' }
};

var PREFERRED_VOICE_NAMES = ['Google US English', 'Samantha', 'Microsoft Aria Online (Natural) - English (United States)', 'Alex'];
var cachedVoice = null;
function getBestVoice() {
  if (!window.speechSynthesis) return null;
  if (cachedVoice) return cachedVoice;
  var voices = window.speechSynthesis.getVoices();
  for (var i = 0; i < PREFERRED_VOICE_NAMES.length; i++) {
    var found = voices.filter(function (v) { return v.name === PREFERRED_VOICE_NAMES[i]; })[0];
    if (found) { cachedVoice = found; return found; }
  }
  var enUS = voices.filter(function (v) { return v.lang === 'en-US'; })[0];
  return enUS || null;
}
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = function () { cachedVoice = null; };
}

function speakText(text) {
  if (!window.speechSynthesis) return;
  var utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = 1.05;
  var voice = getBestVoice();
  if (voice) utter.voice = voice;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utter);
}

function speakOptionsForStep(i) {
  var cfg = STEP_SELECTS[i];
  if (!cfg) return false;
  var select = document.getElementById(cfg.sel);
  var opts = Array.prototype.map.call(select.options, function (o) { return o.textContent; })
    .filter(function (t) { return t && t.indexOf('Select ') !== 0 && t !== '+ Add new'; });
  document.getElementById('statusMsg').textContent = cfg.label + ': ' + opts.join(', ');
  return true;
}

var spellingActive = false;
var spellingBuffer = '';
var spellingFieldId = null;

var NATO_LETTERS = {
  alpha: 'a', bravo: 'b', charlie: 'c', delta: 'd', echo: 'e', foxtrot: 'f',
  golf: 'g', hotel: 'h', india: 'i', juliet: 'j', juliett: 'j', kilo: 'k',
  lima: 'l', mike: 'm', november: 'n', oscar: 'o', papa: 'p', quebec: 'q',
  romeo: 'r', sierra: 's', tango: 't', uniform: 'u', victor: 'v',
  whiskey: 'w', xray: 'x', 'x-ray': 'x', yankee: 'y', zulu: 'z'
};
var PHONETIC_LETTERS = {
  bee: 'b', cee: 'c', see: 'c', sea: 'c', dee: 'd', ee: 'e', ef: 'f', eff: 'f',
  gee: 'g', aitch: 'h', eye: 'i', jay: 'j', kay: 'k', el: 'l', ell: 'l',
  em: 'm', en: 'n', oh: 'o', pee: 'p', cue: 'q', queue: 'q', ar: 'r',
  ess: 's', tee: 't', you: 'u', vee: 'v', ex: 'x', why: 'y', zee: 'z', zed: 'z'
};

function letterFromWord(word) {
  var w = word.toLowerCase().trim();
  if (w.length === 1 && /[a-z0-9]/.test(w)) return w;
  if (NATO_LETTERS[w]) return NATO_LETTERS[w];
  if (PHONETIC_LETTERS[w]) return PHONETIC_LETTERS[w];
  return null;
}

function resolveSpellTarget(i) {
  if (i === 1) {
    document.getElementById('systemSelect').value = '__new__';
    document.getElementById('systemNewRow').style.display = 'block';
    return 'systemNew';
  }
  if (i === 2) return 'partName';
  if (i === 4) return 'description';
  if (i === 5) {
    document.getElementById('locationSelect').value = '__new__';
    document.getElementById('locationNewRow').style.display = 'block';
    return 'locationNew';
  }
  if (i === 6) return 'manufacturer';
  if (i === 10) return 'supplier';
  if (i === 14) return 'notes';
  return null;
}

function updateSpellingField() {
  document.getElementById(spellingFieldId).value = spellingBuffer;
  document.getElementById('statusMsg').textContent =
    'Spelling: ' + (spellingBuffer || '(nothing yet)') +
    '. Letters, NATO words, "space", "dash", "delete", or "done".';
}

function startSpelling(fieldId) {
  spellingActive = true;
  spellingFieldId = fieldId;
  spellingBuffer = document.getElementById(fieldId).value || '';
  updateSpellingField();
  autoListenTimer = setTimeout(listenForSpelling, 400);
}

function exitSpelling() {
  spellingActive = false;
  spellingFieldId = null;
}

function listenForSpelling() {
  var stepAtCall = current;
  startRecognition(
    function (text) { handleSpellingInput(text, stepAtCall); },
    function (err) {
      if (err !== 'not-allowed' && spellingActive && current === stepAtCall) {
        autoListenTimer = setTimeout(listenForSpelling, 500);
      }
    }
  );
}

function handleSpellingInput(text, stepAtCall) {
  var s = text.toLowerCase().trim().replace(/[.!?]+$/, '');

  if (s === 'next' || s === 'done' || s === 'finished' || s === 'stop') {
    document.getElementById(spellingFieldId).value = spellingBuffer;
    exitSpelling();
    document.getElementById('statusMsg').textContent = '';
    setTimeout(function () { go(1); }, 400);
    return;
  }
  if (s === 'back') {
    document.getElementById(spellingFieldId).value = spellingBuffer;
    exitSpelling();
    go(-1);
    return;
  }
  if (s === 'delete' || s === 'backspace') {
    spellingBuffer = spellingBuffer.slice(0, -1);
    updateSpellingField();
    autoListenTimer = setTimeout(listenForSpelling, 400);
    return;
  }
  if (s === 'space') {
    spellingBuffer += ' ';
    updateSpellingField();
    autoListenTimer = setTimeout(listenForSpelling, 400);
    return;
  }
  if (s === 'dash' || s === 'hyphen') {
    spellingBuffer += '-';
    updateSpellingField();
    autoListenTimer = setTimeout(listenForSpelling, 400);
    return;
  }
  if (s === 'clear') {
    spellingBuffer = '';
    updateSpellingField();
    autoListenTimer = setTimeout(listenForSpelling, 400);
    return;
  }

  var letter = letterFromWord(s);
  if (letter) {
    spellingBuffer += letter;
    updateSpellingField();
    autoListenTimer = setTimeout(listenForSpelling, 400);
    return;
  }

  var tokens = s.split(/\s+/);
  var mapped = tokens.map(letterFromWord);
  if (mapped.length > 0 && mapped.every(function (x) { return x; })) {
    spellingBuffer += mapped.join('');
    updateSpellingField();
    autoListenTimer = setTimeout(listenForSpelling, 400);
    return;
  }

  document.getElementById('statusMsg').textContent =
    'Did not understand "' + text + '" while spelling. Say a letter, NATO word, space, dash, delete, or done.';
  autoListenTimer = setTimeout(listenForSpelling, 500);
}

function tryGlobalCommand(text) {
  if (spellingActive) {
    handleSpellingInput(text, current);
    return true;
  }

  var s = text.toLowerCase().trim().replace(/[.!?]+$/, '');
  if (s === 'spell') {
    var target = resolveSpellTarget(current);
    if (target) {
      startSpelling(target);
    } else {
      document.getElementById('statusMsg').textContent = 'Spelling is not available on this screen.';
      triggerAutoListenForStep(current);
    }
    return true;
  }
  if (current === SUCCESS_STEP && (s === 'next' || s === 'add another' || s === 'another')) {
    resetForm(); return true;
  }
  if (s === 'next' || s === 'skip') { go(1); return true; }
  if (s === 'back') { go(-1); return true; }
  if (s === 'repeat' || s === 'redo') {
    document.getElementById('statusMsg').textContent = '';
    triggerAutoListenForStep(current);
    return true;
  }
  if (s === 'delete' || s === 'clear') {
    clearCurrentStepFields();
    document.getElementById('statusMsg').textContent = 'Cleared.';
    triggerAutoListenForStep(current);
    return true;
  }
  if (s === 'list') {
    var shown = speakOptionsForStep(current);
    if (shown) {
      triggerAutoListenForStep(current);
    } else {
      lastGoDelta = 1;
      current = REVIEW_STEP;
      showStep(current);
      speakReview();
    }
    return true;
  }
  if (s === 'review') {
    lastGoDelta = 1;
    current = REVIEW_STEP;
    showStep(current);
    speakReview();
    return true;
  }
  if (s === 'submit' || s === 'save') {
    if (current === REVIEW_STEP) submitForm();
    return true;
  }
  return false;
}

function clearCurrentStepFields() {
  if (current === 1) {
    document.getElementById('systemSelect').value = '';
    document.getElementById('systemNew').value = '';
    document.getElementById('systemNewRow').style.display = 'none';
  } else if (current === 2) {
    document.getElementById('partName').value = '';
  } else if (current === 3) {
    document.getElementById('categorySelect').value = '';
  } else if (current === 4) {
    document.getElementById('description').value = '';
  } else if (current === 5) {
    document.getElementById('locationSelect').value = '';
    document.getElementById('locationNew').value = '';
    document.getElementById('locationNewRow').style.display = 'none';
  } else if (current === 6) {
    document.getElementById('manufacturer').value = '';
  } else if (current === 7) {
    document.getElementById('qty').value = '';
  } else if (current === 8) {
    document.getElementById('minStock').value = '';
  } else if (current === 9) {
    document.getElementById('unitCost').value = '';
  } else if (current === 10) {
    document.getElementById('supplier').value = '';
  } else if (current === 13) {
    document.getElementById('criticalSelect').value = 'N';
  } else if (current === 14) {
    document.getElementById('notes').value = '';
  }
}

function speakReview() {
  if (!window.speechSynthesis) return;
  setTimeout(function () {
    var text = document.getElementById('reviewBox').innerText.replace(/\n/g, '. ');
    speakText(text);
  }, 300);
}

function autoVoiceText(fieldId) {
  var stepAtCall = current;
  startRecognition(
    function (text) {
      document.getElementById(fieldId).value = text;
      setTimeout(function () { go(1); }, 500);
    },
    function (err) {
      if (err !== 'not-allowed' && current === stepAtCall) {
        autoListenTimer = setTimeout(function () { autoVoiceText(fieldId); }, 600);
      }
    }
  );
}

function autoVoiceDropdownOrNew(selectId, newId, newRowId) {
  var stepAtCall = current;
  startRecognition(
    function (text) {
      var select = document.getElementById(selectId);
      var options = Array.prototype.map.call(select.options, function (o) { return o.value; })
        .filter(function (v) { return v && v !== '__new__'; });
      var match = matchAgainstList(text, options);
      if (match) {
        select.value = match;
        document.getElementById(newRowId).style.display = 'none';
      } else {
        select.value = '__new__';
        document.getElementById(newId).value = text;
        document.getElementById(newRowId).style.display = 'block';
      }
      setTimeout(function () { go(1); }, 500);
    },
    function (err) {
      if (err !== 'not-allowed' && current === stepAtCall) {
        autoListenTimer = setTimeout(function () { autoVoiceDropdownOrNew(selectId, newId, newRowId); }, 600);
      }
    }
  );
}

function matchAgainstList(spoken, options) {
  var s = spoken.toLowerCase().trim();
  for (var i = 0; i < options.length; i++) {
    var o = options[i].toLowerCase();
    if (s.indexOf(o) !== -1 || o.indexOf(s) !== -1) return options[i];
  }
  return null;
}

function extractNumber(spoken) {
  var m = spoken.match(/\d+(\.\d+)?/);
  return m ? m[0] : null;
}

function autoVoiceCategory() {
  var stepAtCall = current;
  startRecognition(
    function (text) {
      var match = matchAgainstList(text, CATEGORY_OPTIONS);
      if (match) {
        document.getElementById('categorySelect').value = match;
        setTimeout(function () { go(1); }, 500);
      } else {
        document.getElementById('statusMsg').textContent =
          'Did not recognize a category from "' + text + '". Say it again, or say a category name.';
        if (current === stepAtCall) autoListenTimer = setTimeout(autoVoiceCategory, 600);
      }
    },
    function (err) {
      if (err !== 'not-allowed' && current === stepAtCall) {
        autoListenTimer = setTimeout(autoVoiceCategory, 600);
      }
    }
  );
}

function autoVoiceYesNo() {
  var stepAtCall = current;
  startRecognition(
    function (text) {
      var s = text.toLowerCase();
      var isYes = /\b(yes|yeah|yep|correct|affirmative)\b/.test(s);
      var isNo = /\b(no|nope|negative)\b/.test(s);
      if (isYes) { document.getElementById('criticalSelect').value = 'Y'; setTimeout(function () { go(1); }, 500); }
      else if (isNo) { document.getElementById('criticalSelect').value = 'N'; setTimeout(function () { go(1); }, 500); }
      else {
        document.getElementById('statusMsg').textContent =
          'Did not catch yes or no from "' + text + '". Say yes or no.';
        if (current === stepAtCall) autoListenTimer = setTimeout(autoVoiceYesNo, 600);
      }
    },
    function (err) {
      if (err !== 'not-allowed' && current === stepAtCall) {
        autoListenTimer = setTimeout(autoVoiceYesNo, 600);
      }
    }
  );
}

function autoVoiceNumber(fieldId) {
  var stepAtCall = current;
  startRecognition(
    function (text) {
      var num = extractNumber(text);
      if (num !== null) {
        document.getElementById(fieldId).value = num;
        setTimeout(function () { go(1); }, 500);
      } else {
        document.getElementById('statusMsg').textContent = 'Did not catch a number. Say it again.';
        if (current === stepAtCall) autoListenTimer = setTimeout(function () { autoVoiceNumber(fieldId); }, 600);
      }
    },
    function (err) {
      if (err !== 'not-allowed' && current === stepAtCall) {
        autoListenTimer = setTimeout(function () { autoVoiceNumber(fieldId); }, 600);
      }
    }
  );
}

function autoVoiceCommandOnly() {
  var stepAtCall = current;
  startRecognition(
    function () {
      document.getElementById('statusMsg').textContent =
        'Say next, back, skip, delete, list, spell, or save.';
      if (current === stepAtCall) autoListenTimer = setTimeout(autoVoiceCommandOnly, 400);
    },
    function (err) {
      if (err !== 'not-allowed' && current === stepAtCall) {
        autoListenTimer = setTimeout(autoVoiceCommandOnly, 600);
      }
    }
  );
}

document.querySelectorAll('.mic-btn').forEach(function (btn) {
  btn.addEventListener('click', function () {
    if (!Recognition) {
      alert('Voice input is not supported in this browser. Try Chrome.');
      return;
    }
    var targetId = btn.dataset.target;
    var selectId = btn.dataset.select;
    startRecognition(
      function (text) {
        var el = document.getElementById(targetId);
        el.value = text;
        if (selectId) {
          var rowId = selectId === 'systemSelect' ? 'systemNewRow' : 'locationNewRow';
          document.getElementById(rowId).style.display = 'block';
        }
      },
      function (err) {
        alert('Mic error: ' + err + '. If this says not-allowed, grant microphone permission to this site in your browser settings and try again.');
      }
    );
  });
});

document.querySelectorAll('input[type=text], input[type=number], textarea').forEach(function (el) {
  el.addEventListener('focus', function () { clearTimeout(autoListenTimer); });
});

function applySuggestion(fieldId, value, label) {
  if (!value) return;
  document.getElementById(fieldId).value = value;
  document.getElementById('statusMsg').textContent =
    'Suggested from photo, ' + label + ': "' + value + '". Say "next" to accept, or say the correct value to change it.';
}

function triggerAutoListenForStep(i) {
  clearTimeout(autoListenTimer);
  stopActiveRecognition();
  if (photoAnalysis) {
    if (i === 2) applySuggestion('partName', photoAnalysis.partName, 'part name');
    else if (i === 3 && photoAnalysis.category) {
      var catMatch = matchAgainstList(photoAnalysis.category, CATEGORY_OPTIONS);
      if (catMatch) applySuggestion('categorySelect', catMatch, 'category');
    } else if (i === 4) applySuggestion('description', photoAnalysis.description, 'description');
    else if (i === 6) {
      var combined = [photoAnalysis.manufacturer, photoAnalysis.partNumber].filter(function (x) { return x; }).join(' ');
      applySuggestion('manufacturer', combined, 'manufacturer');
    }
  }
  if (!Recognition) return;
  autoListenTimer = setTimeout(function () {
    if (i === 1) autoVoiceDropdownOrNew('systemSelect', 'systemNew', 'systemNewRow');
    else if (i === 2) autoVoiceText('partName');
    else if (i === 3) autoVoiceCategory();
    else if (i === 4) autoVoiceText('description');
    else if (i === 5) autoVoiceDropdownOrNew('locationSelect', 'locationNew', 'locationNewRow');
    else if (i === 6) autoVoiceText('manufacturer');
    else if (i === 7) autoVoiceNumber('qty');
    else if (i === 8) autoVoiceNumber('minStock');
    else if (i === 9) autoVoiceNumber('unitCost');
    else if (i === 10) autoVoiceText('supplier');
    else if (i === 13) autoVoiceYesNo();
    else if (i === 14) autoVoiceText('notes');
    else autoVoiceCommandOnly();
  }, 600);
}

function fieldVal(id) { return document.getElementById(id).value || ''; }
function resolvedSystem() {
  var v = fieldVal('systemSelect');
  return v === '__new__' ? fieldVal('systemNew') : v;
}
function resolvedLocation() {
  var v = fieldVal('locationSelect');
  return v === '__new__' ? fieldVal('locationNew') : v;
}

function buildReview() {
  var rows = [
    ['System', resolvedSystem()], ['Part', fieldVal('partName')],
    ['Category', fieldVal('categorySelect')], ['Description', fieldVal('description')],
    ['Location', resolvedLocation()], ['Manufacturer', fieldVal('manufacturer')],
    ['Qty on hand', fieldVal('qty')], ['Min stock', fieldVal('minStock')],
    ['Unit cost', fieldVal('unitCost')], ['Supplier', fieldVal('supplier')],
    ['Purchase date', fieldVal('purchaseDate')], ['Expiration date', fieldVal('expirationDate')],
    ['Critical spare', fieldVal('criticalSelect')], ['Notes', fieldVal('notes')],
    ['Photo attached', photoBase64 ? 'Yes' : 'No']
  ];
  document.getElementById('reviewBox').innerHTML = rows.map(function (r) {
    return '<div class="review-line"><b>' + r[0] + ':</b> ' + (r[1] || '--') + '</div>';
  }).join('');
}

function buildFilename() {
  var clean = function (s) { return (s || '').trim().replace(/\s+/g, '-'); };
  var d = fieldVal('purchaseDate') || new Date().toISOString().slice(0, 10);
  var dateToken = d.replace(/-/g, '');
  return clean(resolvedSystem()) + '_' + clean(fieldVal('partName')) + '_' +
         clean(resolvedLocation()) + '_' + dateToken + '.jpg';
}

function postToScript(payload) {
  return fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  }).then(function (r) { return r.json(); });
}

function submitForm() {
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('statusMsg').textContent = 'Saving...';
  var partNameForSuccess = fieldVal('partName');
  var item = {
    partName: fieldVal('partName'),
    system: resolvedSystem(),
    category: fieldVal('categorySelect'),
    description: fieldVal('description'),
    location: resolvedLocation(),
    manufacturer: fieldVal('manufacturer'),
    qty: fieldVal('qty'),
    minStock: fieldVal('minStock'),
    unitCost: fieldVal('unitCost'),
    supplier: fieldVal('supplier'),
    purchaseDate: fieldVal('purchaseDate'),
    expirationDate: fieldVal('expirationDate'),
    critical: fieldVal('criticalSelect'),
    notes: fieldVal('notes'),
    filename: buildFilename(),
    photoUrl: null
  };

  function finishSubmit() {
    postToScript({ action: 'submitItem', item: item })
      .then(function (res) {
        if (res.error) throw new Error(res.error);
        document.getElementById('statusMsg').textContent = '';
        document.getElementById('successDetail').textContent =
          partNameForSuccess ? '"' + partNameForSuccess + '" added, row ' + res.row : 'Row ' + res.row;
        current = SUCCESS_STEP;
        showStep(current);
        document.getElementById('submitBtn').disabled = false;
      })
      .catch(function (err) {
        document.getElementById('statusMsg').textContent = 'Error: ' + err.message;
        document.getElementById('submitBtn').disabled = false;
      });
  }

  if (photoBase64) {
    postToScript({ action: 'uploadPhoto', base64Data: photoBase64, mimeType: photoMime, filename: item.filename })
      .then(function (res) {
        if (res.error) throw new Error(res.error);
        item.photoUrl = res.url;
        item.filename = res.name;
        finishSubmit();
      })
      .catch(function (err) {
        document.getElementById('statusMsg').textContent = 'Photo upload failed: ' + err.message;
        document.getElementById('submitBtn').disabled = false;
      });
  } else {
    finishSubmit();
  }
}

function resetForm() {
  stopActiveRecognition();
  ['partName', 'description', 'manufacturer', 'qty', 'minStock', 'unitCost', 'supplier',
   'expirationDate', 'notes', 'systemNew', 'locationNew'].forEach(function (id) {
    document.getElementById(id).value = '';
  });
  document.getElementById('systemSelect').value = '';
  document.getElementById('locationSelect').value = '';
  document.getElementById('categorySelect').value = '';
  document.getElementById('criticalSelect').value = 'N';
  document.getElementById('systemNewRow').style.display = 'none';
  document.getElementById('locationNewRow').style.display = 'none';
  document.getElementById('photoCameraInput').value = '';
  document.getElementById('photoFileInput').value = '';
  document.getElementById('photoPreview').style.display = 'none';
  photoBase64 = null; photoMime = null; photoFilename = null;
  document.getElementById('purchaseDate').valueAsDate = new Date();
  document.getElementById('statusMsg').textContent = '';
  current = 0;
  showStep(0);
  fetch(SCRIPT_URL + '?action=getFormData')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      fillSelect('systemSelect', data.systems, 'System');
      fillSelect('locationSelect', data.locations, 'Location');
      fillSelect('categorySelect', data.categories, 'Category');
    });
}

document.getElementById('purchaseDate').valueAsDate = new Date();
showStep(0);
</script>
